<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Trainer - 和弦听力训练器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="trainer-container">
        <header class="trainer-header">
            <h1>🎵 和弦听力训练器</h1>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">分数</span>
                    <span class="stat-value" id="scoreValue">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">题目</span>
                    <span class="stat-value"><span id="questionNumber">0</span> / 10</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">倒计时</span>
                    <span class="stat-value" id="countdownValue">3.0</span>s
                </div>
            </div>
        </header>

        <main class="trainer-main">
            <div class="question-area">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="question-text">请听下面的和弦，选择正确的和弦类型：</p>
                <div class="play-area">
                    <button id="playBtn" class="btn btn-primary">
                        🔊 播放和弦
                    </button>
                    <button id="replayBtn" class="btn btn-secondary" disabled>
                        🔁 重听
                    </button>
                </div>
                <div class="chord-display" id="chordDisplay">
                    当前和弦：?
                </div>
                <div class="feedback-area" id="feedbackArea"></div>
            </div>

            <div class="options-area">
                <div class="options-grid" id="optionsGrid">
                </div>
            </div>
        </main>

        <div class="level-indicator">
            当前难度：<span id="levelText">初级 (大三 / 小三)</span>
        </div>

        <div class="results-modal" id="resultsModal" style="display:none;">
            <div class="results-content">
                <h2>🎉 训练完成！</h2>
                <div class="final-score">
                    总分：<span id="finalScore">0</span>
                </div>
                <div class="accuracy-summary">
                    总正确率：<span id="totalAccuracy">0%</span>
                </div>
                <div class="type-stats" id="typeStats">
                </div>
                <button id="restartBtn" class="btn btn-primary">
                    🔄 重新开始
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
