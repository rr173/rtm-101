<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Piano Roll Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="toolbar">
            <div class="toolbar-left">
                <button id="recordBtn" class="toolbar-btn record-btn" title="Record (R)">⏺</button>
                <button id="playBtn" class="toolbar-btn" title="Play (Space)">▶</button>
                <button id="pauseBtn" class="toolbar-btn" title="Pause">⏸</button>
                <button id="stopBtn" class="toolbar-btn" title="Stop">⏹</button>
                <div class="bpm-control">
                    <label for="bpmInput">BPM:</label>
                    <input type="number" id="bpmInput" min="40" max="300" value="120">
                </div>
                <div class="quantize-control">
                    <label for="quantizeSelect">Quantize:</label>
                    <select id="quantizeSelect" class="quantize-select">
                        <option value="0">Off</option>
                        <option value="4">1/4</option>
                        <option value="2">1/8</option>
                        <option value="1" selected>1/16</option>
                    </select>
                </div>
                <div class="metronome-control">
                    <button id="metronomeBtn" class="toolbar-btn metronome-btn" title="Metronome">
                        <span class="metronome-icon">🥁</span>
                        <span class="metronome-state">Off</span>
                    </button>
                </div>
                <div class="snap-control">
                    <button id="snapBtn" class="toolbar-btn snap-btn" title="Snap to Grid">
                        <span class="snap-icon">⊞</span>
                        <span class="snap-state">Off</span>
                    </button>
                </div>
            </div>
            <div class="toolbar-right">
                <button id="importMidiBtn" class="toolbar-btn">Import MIDI</button>
                <button id="exportMidiBtn" class="toolbar-btn">Export MIDI</button>
            </div>
        </div>

        <div class="main-content">
            <div class="piano-roll-container">
                <div class="top-spacer"></div>
                <div class="piano-keyboard" id="pianoKeyboard"></div>
                <div class="ruler-container" id="rulerContainer">
                    <canvas id="rulerCanvas"></canvas>
                </div>
                <div class="grid-area">
                    <div class="grid-main-area">
                        <div class="grid-container" id="gridContainer">
                            <canvas id="gridCanvas"></canvas>
                        </div>
                        <div class="automation-container" id="automationContainer">
                            <div class="automation-spacer"></div>
                            <div class="automation-panel">
                                <div class="automation-toolbar">
                                    <button id="toggleAutomationBtn" class="automation-toggle-btn" title="Toggle Automation Panel"><span class="btn-arrow">▾</span> Automation</button>
                                    <div class="automation-controls">
                                        <select id="channelSelect" class="channel-select"></select>
                                        <button id="addChannelBtn" class="automation-btn">+ Add Channel</button>
                                        <button id="deleteChannelBtn" class="automation-btn danger">× Delete</button>
                                    </div>
                                </div>
                                <div class="automation-canvas-container" id="automationCanvasContainer">
                                    <canvas id="automationCanvas"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="velocity-panel" id="velocityPanel">
                        <div class="velocity-toolbar">
                            <button id="toggleVelocityBtn" class="automation-toggle-btn" title="Toggle Velocity Panel"><span class="btn-arrow">◂</span> Velocity</button>
                        </div>
                        <div class="velocity-canvas-container" id="velocityCanvasContainer">
                            <canvas id="velocityCanvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="track-panel">
            <div class="track-header">
                <span>Tracks</span>
                <button id="addTrackBtn" class="track-btn">+</button>
            </div>
            <div id="trackList" class="track-list"></div>
        </div>
    </div>

    <div id="contextMenu" class="context-menu">
        <div class="menu-item" data-action="velocity">Set Velocity...</div>
        <div class="menu-item" data-action="copy">Copy</div>
        <div class="menu-item" data-action="paste">Paste</div>
        <div class="menu-item" data-action="delete">Delete</div>
    </div>

    <div id="interpolationMenu" class="context-menu">
        <div class="menu-item" data-interpolation="linear">Linear</div>
        <div class="menu-item" data-interpolation="step">Step</div>
        <div class="menu-item" data-interpolation="sCurve">S-Curve</div>
    </div>

    <div id="addChannelDialog" class="dialog">
        <div class="dialog-content">
            <h3>Add Automation Channel</h3>
            <select id="newChannelType" class="channel-type-select">
                <option value="volume">Volume</option>
                <option value="pan">Pan</option>
                <option value="pitchBend">Pitch Bend</option>
                <option value="modulation">Modulation</option>
            </select>
            <div class="dialog-buttons">
                <button id="addChannelOk">OK</button>
                <button id="addChannelCancel">Cancel</button>
            </div>
        </div>
    </div>

    <div id="velocityDialog" class="dialog">
        <div class="dialog-content">
            <h3>Set Velocity</h3>
            <input type="range" id="velocitySlider" min="1" max="127" value="100">
            <span id="velocityValue">100</span>
            <div class="dialog-buttons">
                <button id="velocityOk">OK</button>
                <button id="velocityCancel">Cancel</button>
            </div>
        </div>
    </div>

    <div id="importMidiDialog" class="dialog">
        <div class="dialog-content">
            <h3>Import MIDI File</h3>
            <p id="importMidiMessage">This will replace all current tracks and notes. Continue?</p>
            <div class="dialog-buttons">
                <button id="importMidiOk">Import</button>
                <button id="importMidiCancel">Cancel</button>
            </div>
        </div>
    </div>

    <input type="file" id="midiFileInput" accept=".mid,.midi" style="display:none">

    <script src="app.js"></script>
</body>
</html>
