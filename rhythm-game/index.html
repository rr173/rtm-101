<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Game - 节奏打击</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🎵 节奏打击</h1>
        </header>

        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">SCORE</span>
                <span class="hud-value" id="scoreValue">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">COMBO</span>
                <span class="hud-value combo" id="comboValue">0</span>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="480" height="640"></canvas>

            <div class="overlay" id="startOverlay">
                <div class="overlay-content">
                    <h2>节奏打击</h2>
                    <p class="subtitle">按 D / F / J / K 打击对应轨道</p>
                    <div class="speed-control">
                        <label for="speed">下落速度: <span id="speedLabel">1.5x</span></label>
                        <input type="range" id="speedSlider" min="1" max="3" step="0.1" value="1.5">
                    </div>
                    <p class="hint">按 空格键 开始游戏</p>
                </div>
            </div>

            <div class="overlay hidden" id="resultOverlay">
                <div class="overlay-content">
                    <h2>🎉 游戏结束</h2>
                    <div class="final-score">
                        最终分数: <span id="finalScore">0</span>
                    </div>
                    <div class="judge-stats">
                        <div class="stat-row">
                            <span class="perfect">Perfect</span>
                            <span id="perfectCount">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="good">Good</span>
                            <span id="goodCount">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="miss">Miss</span>
                            <span id="missCount">0</span>
                        </div>
                    </div>
                    <div class="max-combo">
                        最大连击: <span id="maxCombo">0</span>
                    </div>
                    <button class="btn" id="restartBtn">重新开始</button>
                </div>
            </div>
        </div>

        <div class="key-hints">
            <div class="key-hint lane-0">D</div>
            <div class="key-hint lane-1">F</div>
            <div class="key-hint lane-2">J</div>
            <div class="key-hint lane-3">K</div>
        </div>
    </div>

    <div class="judge-popup" id="judgePopup"></div>

    <script src="game.js"></script>
</body>
</html>
